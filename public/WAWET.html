<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Enterprise Wallpaper Upload</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg-main: radial-gradient(circle at 20% 20%, #1e293b, #0f172a 60%);
  --card-bg: rgba(255,255,255,0.05);
  --border-color: rgba(255,255,255,0.08);
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --input-bg: #0f172a;
  --accent-color: #3b82f6;
  --success-color: #22c55e;
}
body.light {
  --bg-main: #f1f5f9;
  --card-bg: rgba(255,255,255,0.9);
  --border-color: rgba(0,0,0,0.08);
  --text-primary: #0f172a;
  --text-secondary: #475569;
  --input-bg: #ffffff;
}
* { box-sizing: border-box; transition: background 0.3s ease, color 0.3s ease; }
body {
  margin:0; font-family:'Inter',sans-serif; background:var(--bg-main); color:var(--text-primary);
  display:flex; align-items:center; justify-content:center; height:100vh; overflow:hidden; position:relative;
}
body::before {
  content:""; position:absolute; width:200%; height:200%;
  background-image: radial-gradient(var(--accent-color) 1px, transparent 1px);
  background-size:60px 60px; opacity:0.04; animation:moveBg 60s linear infinite;
}
@keyframes moveBg { from{transform:translate(0,0);} to{transform:translate(-200px,-200px);} }
.theme-toggle { position:absolute; top:20px; right:30px; font-size:13px; cursor:pointer; color:var(--text-secondary);}
.card { position:relative; padding:48px; width:480px; border-radius:18px;
  background:var(--card-bg); backdrop-filter:blur(18px); border:1px solid var(--border-color);
  box-shadow:0 20px 60px rgba(0,0,0,0.25); animation:cardEnter 0.6s cubic-bezier(0.16,1,0.3,1); text-align:center;}
.card::before { content:""; position:absolute; inset:-1px; border-radius:18px; padding:1px;
  background:linear-gradient(135deg,#3b82f6,#6366f1,#8b5cf6);
  -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
  -webkit-mask-composite: xor; mask-composite: exclude; opacity:0.5;}
@keyframes cardEnter {0%{opacity:0;transform:translateY(20px) scale(0.98);} 100%{opacity:1;transform:translateY(0) scale(1);}}
h1{font-size:22px;margin-bottom:8px;}
.subtitle{font-size:13px;color:var(--text-secondary);margin-bottom:32px;}
.hidden-token{display:none;}
/* Drop zone + thumbnail + cancel */
.drop-zone { border:1px dashed var(--border-color); padding:30px; text-align:center; border-radius:12px;
  margin-bottom:20px; cursor:pointer; transition:0.2s ease; position:relative;}
.drop-zone.dragover{border-color:var(--accent-color); background: rgba(59,130,246,0.08);}
.drop-zone img { max-width:100%; max-height:150px; border-radius:8px; display:block; margin:0 auto 12px;
  opacity:0; transform:translateY(-8px); transition: opacity 0.3s ease, transform 0.3s ease;}
.drop-zone img.fade-in { opacity:1; transform:translateY(0); }
.cancel-btn { position:absolute; top:8px; right:8px; background:rgba(255,255,255,0.2); border:none; border-radius:50%; width:24px; height:24px; cursor:pointer; color:white; font-weight:bold; display:none; }
.cancel-btn:hover{ background:rgba(255,255,255,0.35); }
.drop-sub{font-size:12px;opacity:0.7;}
/* Logo */
.card-logo { height:48px; margin-bottom:16px; }
/* Button */
button{width:100%;padding:14px;border-radius:10px;border:none;font-weight:600;
  background:linear-gradient(135deg,#2563eb,#3b82f6);color:white;cursor:pointer;}
button:disabled{opacity:0.6;}
/* Progress */
.progress-container{width:100%;background:var(--border-color);border-radius:8px;overflow:hidden;margin-top:15px;height:8px;display:none;}
.progress-bar{height:100%;width:0%;background:linear-gradient(90deg,#3b82f6,#6366f1);transition:width 0.2s ease;}
.progress-text{font-size:12px;text-align:right;margin-top:6px;color: var(--text-secondary);}
.success-check{width:60px;height:60px;border-radius:50%;border:3px solid var(--success-color);display:flex;align-items:center;justify-content:center;margin:20px auto;}
.success-check svg{stroke:var(--success-color);stroke-width:3;fill:none;stroke-dasharray:50;stroke-dashoffset:50;animation:draw 0.6s ease forwards;}
@keyframes draw{to{stroke-dashoffset:0;}}
.hash-box{display:flex;gap:8px;margin-top:10px;}
.hash-box input{flex:1;padding:10px;border-radius:8px;border:1px solid var(--border-color);background:var(--input-bg);color:var(--text-primary);}
.copy-btn{padding:0 14px;border-radius:8px;border:1px solid var(--border-color);background:var(--input-bg);cursor:pointer;}
.hidden{display:none;}
.response{margin-top:20px;text-align:center;}
/* Animated Checkbox */
.checkbox-row{margin-bottom:22px;}
.checkbox-label{display:flex;align-items:center;gap:10px;font-size:14px;cursor:pointer;position:relative;}
.checkbox-label input{opacity:0;position:absolute; width:20px; height:20px; cursor:pointer;}
.checkbox-custom{width:20px;height:20px;border:2px solid var(--border-color);border-radius:5px;display:inline-block;position:relative;transition:all 0.3s;}
.checkbox-custom::after{
  content:""; position:absolute; left:4px; top:0px; width:6px; height:12px;
  border: solid var(--accent-color); border-width:0 2px 2px 0; transform:rotate(45deg) scale(0);
  transition: transform 0.2s ease-in-out;
}
.checkbox-label input:checked + .checkbox-custom::after{
  transform:rotate(45deg) scale(1);
}
.checkbox-subtext{font-size:12px;color:var(--text-secondary);margin-left:30px;margin-top:4px;}
</style>
</head>
<body>
<div class="theme-toggle" id="themeToggle">Toggle Theme</div>
<div class="card">
<img src="https://via.placeholder.com/150x48?text=Contoso" alt="Contoso Logo" class="card-logo">
<h1>Enterprise Wallpaper Upload</h1>
<p class="subtitle">Secure • Audited • RBAC Controlled • SHA-256 Verified</p>

<form id="uploadForm">
<div class="hidden-token">
  <input type="password" id="token" value="DEV_STATIC_TOKEN_PLACEHOLDER" />
</div>

<div class="drop-zone" id="dropZone">
  <img id="thumbPreview" class="hidden" alt="Thumbnail Preview"/>
  <button type="button" id="cancelBtn" class="cancel-btn">&times;</button>
  <div id="dropText">
    <strong>Drag & Drop PNG/JPEG here</strong><br>
    <span class="drop-sub">or click to browse</span>
  </div>
</div>
<input type="file" id="wallpaper" accept="image/png, image/jpeg" style="display:none;" />

<div class="checkbox-row">
  <label class="checkbox-label">
    <input type="checkbox" id="emailConfirm" />
    <span class="checkbox-custom"></span>
    Send confirmation email
  </label>
  <div class="checkbox-subtext">Email will be sent to the authenticated user.</div>
</div>

<button type="submit">Upload Securely</button>

<div class="progress-container" id="progressContainer">
  <div class="progress-bar" id="progressBar"></div>
</div>
<div class="progress-text" id="progressText"></div>

</form>
<div id="responseBox" class="response hidden"></div>
</div>

<script>
/* Theme */
const body=document.body;
if(localStorage.getItem('theme')==='light') body.classList.add('light');
document.getElementById('themeToggle').onclick=()=>{
  body.classList.toggle('light');
  localStorage.setItem('theme',body.classList.contains('light')?'light':'dark');
};

/* Drag & Drop + Thumbnail + Cancel + JPEG->PNG */
const dropZone=document.getElementById('dropZone');
const fileInput=document.getElementById('wallpaper');
const dropText=document.getElementById('dropText');
const thumbPreview=document.getElementById('thumbPreview');
const cancelBtn=document.getElementById('cancelBtn');

function updateThumbnail(file){
  if(file){
    const reader=new FileReader();
    reader.onload=e=>{
      thumbPreview.src=e.target.result;
      thumbPreview.classList.remove('hidden');
      thumbPreview.classList.add('fade-in');
      cancelBtn.style.display="block";
    };
    reader.readAsDataURL(file);
    dropText.innerHTML=`<strong>${file.name}</strong><br><span class="drop-sub">${(file.size/1024).toFixed(1)} KB</span>`;
  } else {
    thumbPreview.classList.add('hidden');
    thumbPreview.classList.remove('fade-in');
    cancelBtn.style.display="none";
    dropText.innerHTML=`<strong>Drag & Drop PNG/JPEG here</strong><br><span class="drop-sub">or click to browse</span>`;
    fileInput.value="";
  }
}

// Convert JPEG to PNG client-side
async function fileToPNG(file){
  if(file.type==="image/png") return file;
  return new Promise((resolve)=>{
    const img=new Image();
    img.onload=function(){
      const canvas=document.createElement('canvas');
      canvas.width=img.width;
      canvas.height=img.height;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0);
      canvas.toBlob(blob=>resolve(new File([blob], file.name.replace(/\.[^/.]+$/,".png"), {type:"image/png"})), "image/png");
    };
    img.src=URL.createObjectURL(file);
  });
}

// Drag & Drop handlers
dropZone.addEventListener('click',()=>fileInput.click());
fileInput.addEventListener('change',async ()=>{ 
  if(fileInput.files[0]) {
    const file = await fileToPNG(fileInput.files[0]);
    const dt=new DataTransfer(); dt.items.add(file); fileInput.files=dt.files;
    updateThumbnail(file);
  }
});
dropZone.addEventListener('dragover',e=>{ e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave',()=>dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop',async e=>{
  e.preventDefault(); dropZone.classList.remove('dragover');
  if(!e.dataTransfer.files.length) return;
  let file=e.dataTransfer.files[0];
  if(!["image/png","image/jpeg"].includes(file.type)){ alert("Only PNG/JPEG allowed"); return; }
  if(file.type==="image/jpeg") file = await fileToPNG(file);
  const dt=new DataTransfer(); dt.items.add(file); fileInput.files=dt.files;
  updateThumbnail(file);
});
// Cancel button: resets everything
cancelBtn.addEventListener('click',()=>{
    updateThumbnail(null);
    progressBar.style.width = "0%";
    progressContainer.style.display = "none";
    progressText.innerText = "";
    responseBox.classList.add("hidden");
    responseBox.innerHTML = "";
});

/* Upload */
const emailConfirm=document.getElementById('emailConfirm');
const form=document.getElementById('uploadForm');
const progressBar=document.getElementById('progressBar');
const progressContainer=document.getElementById('progressContainer');
const progressText=document.getElementById('progressText');
const responseBox=document.getElementById('responseBox');

form.addEventListener('submit',async function(e){
  e.preventDefault();
  if(!fileInput.files.length) return alert("Please select a file");
  const file=fileInput.files[0];

  const formData=new FormData();
  formData.append("wallpaper",file);
  if(emailConfirm.checked) formData.append("emailConfirm","true");

  const xhr=new XMLHttpRequest();
  xhr.open("POST","/upload",true);
  xhr.setRequestHeader("Authorization","Bearer "+document.getElementById('token').value);
  progressContainer.style.display="block";
  xhr.upload.onprogress=function(e){
    if(e.lengthComputable){
      const percent=Math.round((e.loaded/e.total)*100);
      progressBar.style.width=percent+"%";
      progressText.innerText=percent+"%";
    }
  };
  xhr.onload=function(){
    const result=JSON.parse(xhr.responseText);
    responseBox.classList.remove("hidden");
    if(xhr.status===200){
      responseBox.innerHTML=`<div class="success-check"><svg viewBox="0 0 24 24"><path d="M4 12l5 5 10-10"/></svg></div>
      <strong>Upload Successful</strong>
      <div class="hash-box">
        <input type="text" value="${result.hash}" readonly />
        <button class="copy-btn">Copy</button>
      </div>`;
      document.querySelector(".copy-btn").onclick=()=>{ navigator.clipboard.writeText(result.hash); };
    } else {
      responseBox.innerHTML=`<span style="color:#ef4444">${result.error}</span>`;
    }
  };
  xhr.send(formData);
});
</script>
</body>
</html>
